    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0d0d0d';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0d0d0d' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script>
      (function () {
        var KEY = 'lc-asset-recovery-at';
        function shouldRecover() {
          try {
            var last = Number(sessionStorage.getItem(KEY)) || 0;
            if (Date.now() - last < 60000) {
              return false;
            }
            sessionStorage.setItem(KEY, String(Date.now()));
            return true;
          } catch (e) {
            return false;
          }
        }
        /** Recovers from stale builds (e.g. an outdated service worker serving old
         * hashed chunks after a deploy) by unregistering workers and reloading once.
         * Returns true when a recovery reload was initiated. */
        window.__lcRecoverStaleAssets = function () {
          if (!shouldRecover()) {
            return false;
          }
          var reload = function () {
            window.location.reload();
          };
          if (navigator.serviceWorker) {
            var scopeBase = new URL('./', document.baseURI || window.location.href).href;
            navigator.serviceWorker
              .getRegistrations()
              .then(function (registrations) {
                return Promise.all(
                  registrations
                    .filter(function (registration) {
                      return registration.scope.indexOf(scopeBase) === 0;
                    })
                    .map(function (registration) {
                      return registration.unregister();
                    }),
                );
              })
              .then(reload, reload);
          } else {
            reload();
          }
          return true;
        };
        if (navigator.serviceWorker) {
          navigator.serviceWorker.addEventListener('message', function (event) {
            if (!event.data || event.data.type !== 'LC_SW_PING') {
              return;
            }
            var source = event.source || navigator.serviceWorker.controller;
            if (source) {
              source.postMessage({ type: 'LC_SW_PONG' });
            }
          });
        }
        window.addEventListener(
          'error',
          function (event) {
            var el = event.target;
            if (!el || !el.tagName) {
              return;
            }
            var failedScript = el.tagName === 'SCRIPT' && el.src;
            var failedPreload =
              el.tagName === 'LINK' && /preload/.test(el.rel || '') && /\.js$/.test(el.href || '');
            if (failedScript || failedPreload) {
              window.__lcRecoverStaleAssets();
            }
          },
          true,
        );
        window.addEventListener('unhandledrejection', function (event) {
          var message = event.reason && event.reason.message;
          if (
            typeof message === 'string' &&
            (message.indexOf('dynamically imported module') !== -1 ||
              message.indexOf('Importing a module script failed') !== -1)
          ) {
            window.__lcRecoverStaleAssets();
          }
        });
      })();
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style id="valore-theme">html, html.dark {

  --surface-tertiary: #fcf8f2;

  --border-light: #e0d8cb;

}
/* Sidebar petrol: redefine as vars dentro do aside para o fade/hover combinarem */
aside {
  background: #073b59 !important;
  --surface-primary-alt: #073b59;
  --surface-active-alt: #0d4a6e;
  --surface-hover: #0d4a6e;
  --surface-hover-alt: #0d4a6e;
  --text-primary: #f4efe7;
  --border-light: rgba(244,239,231,0.12);
  --border-medium: rgba(244,239,231,0.12);
}
aside, aside button, aside a, aside span, aside p, aside h2, aside h3 { color: #f4efe7 !important; }
aside svg { color: #f4efe7 !important; }
aside input { color: #f4efe7 !important; background: rgba(16,34,45,0.35) !important; }
aside input::placeholder { color: rgba(244,239,231,0.55) !important; }
</style>
</head>
  <body>
    <div id="root">
      <div id="loading-container"></div>
    </div>
  <script id="valore-chat">(function () {
  var IVORY = '#f4efe7', COPPER = '#c97533';
  var SIM = '<svg viewBox="0 0 512 512" style="width:34px;height:34px;flex:0 0 auto" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="72" fill="#f4efe7"/><path d="M128 148L252 250L170 287L170 359C170 386 194 410 221 410L221 439C177 439 141 403 141 359V179L128 148Z" fill="#073b59"/><path d="M384 178V344L260 452V352C260 300 287 261 333 233C354 220 371 202 384 178Z" fill="#073b59"/><path d="M214 430V338C214 292 236 258 281 230C321 205 345 175 356 133L411 133V185L374 185C361 208 344 226 321 240C286 263 268 291 268 330V430H214Z" fill="#c97533"/><path d="M194 421V334C194 279 220 239 266 211C304 188 327 162 338 122H366C354 175 327 215 285 240C244 264 222 298 222 345V421H194Z" fill="#d0c1a7"/></svg>';
  function marca() {
    if (document.getElementById('valore-brand')) return;
    var nav = document.querySelector('aside nav') || document.querySelector('nav');
    if (!nav) return;
    var d = document.createElement('div');
    d.id = 'valore-brand';
    d.style.cssText = 'display:flex;align-items:center;gap:11px;padding:14px 16px 12px;flex:0 0 auto';
    d.innerHTML = SIM + '<span style="font-family:Sora,sans-serif;font-weight:600;font-size:18px;letter-spacing:0.12em;color:' + IVORY + '">VALO<span style="color:' + COPPER + '">R</span>E</span>';
    nav.insertBefore(d, nav.firstChild);
  }
  function footer() {
    document.querySelectorAll('a[href*="ibreChat"], a[href*="ibrechat"]').forEach(function (a) {
      var box = a.closest('div');
      if (box) box.style.display = 'none';
    });
  }
  function go() { try { marca(); footer(); } catch (e) {} }
  new MutationObserver(go).observe(document.body, { childList: true, subtree: true });
  go();
})();
</script>
